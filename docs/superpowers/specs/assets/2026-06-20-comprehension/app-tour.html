<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Circuit — Comprehension pillar tour</title>
<style>
  :root{
    --bg:#0e1116;--panel:#161b22;--panel2:#1c2330;--line:#2a3340;
    --txt:#d7e0ea;--dim:#8a97a6;--accent:#5ec8ff;--accent2:#7ee0a8;
    --warn:#ffcf6e;--hot:#ff8a8a;--code:#0b0e13;--hl:#5ec8ff;--hlbg:rgba(94,200,255,.12);
  }
  *{box-sizing:border-box}
  body{margin:0;font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  .app{display:flex;height:100vh}
  /* nav rail */
  .rail{width:188px;background:#0b0e13;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:12px 0}
  .brand{font-weight:700;color:var(--accent);letter-spacing:.5px;padding:8px 16px 16px}
  .navlab{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#4a5563;padding:12px 16px 6px}
  .nav{padding:8px 16px;color:var(--dim);cursor:pointer;border-left:3px solid transparent;display:flex;gap:9px;align-items:center}
  .nav:hover{background:var(--panel)}
  .nav.on{background:var(--hlbg);border-left-color:var(--hl);color:var(--txt)}
  .nav.dis{opacity:.4;cursor:default}
  .nav .tag{margin-left:auto;font-size:9px;color:#4a5563}
  /* main */
  .wrap{flex:1;display:flex;flex-direction:column;min-width:0}
  .top{display:flex;align-items:center;gap:12px;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
  .crumbs{color:var(--dim);font-size:12px}.crumbs b{color:var(--txt)}
  .zoom{margin-left:auto;display:flex;gap:6px;font-size:12px;color:var(--dim);align-items:center}
  .pill{padding:3px 9px;border:1px solid var(--line);border-radius:20px;cursor:pointer}
  .pill.on{background:var(--hlbg);border-color:var(--hl);color:var(--accent)}
  .view{flex:1;overflow:auto;padding:0}
  .hide{display:none}
  h2{margin:0 0 4px;font-size:18px}.lead{color:var(--dim);font-size:13px;margin:0 0 18px;max-width:680px}
  .pad{padding:22px 26px}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:15px 17px}
  .stat{min-width:120px}.stat .n{font-size:22px;font-weight:700}.stat .l{color:var(--dim);font-size:11px;margin-top:2px}
  .bar{height:7px;background:#222c38;border-radius:6px;overflow:hidden;margin-top:9px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .sec{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);margin:24px 0 10px}
  /* context map */
  .ctxmap{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
  .ctx{width:210px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:.15s}
  .ctx:hover{border-color:var(--hl)}
  .ctx h4{margin:0;padding:11px 14px;background:var(--panel2);border-bottom:1px solid var(--line);font-size:13px;display:flex;align-items:center;gap:8px}
  .ctx .body{padding:10px 14px;color:var(--dim);font-size:12px}
  .ctx .feat{padding:3px 0;color:var(--txt)}
  .ctx .dep{font-size:10.5px;color:#5b6675;padding:8px 14px;border-top:1px solid var(--line)}
  .dot{width:8px;height:8px;border-radius:50%;flex:none}
  /* feature surface */
  .fs{display:flex;height:100%;min-height:0}
  .catalog{width:280px;border-right:1px solid var(--line);background:var(--panel);overflow:auto}
  .fhead{padding:11px 14px;font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--line)}
  .feat2{padding:11px 14px;border-left:3px solid transparent;cursor:pointer;border-bottom:1px solid #1a212c}
  .feat2:hover{background:var(--panel2)}.feat2.sel{background:var(--hlbg);border-left-color:var(--hl)}
  .feat2 .nm{font-weight:600;display:flex;gap:7px;align-items:center}
  .feat2 .sb{color:var(--dim);font-size:11px;margin-top:3px}
  .badge{font-size:10px;padding:2px 7px;border-radius:5px;background:#222c38;color:var(--dim);margin-top:6px;display:inline-block}
  .badge.test{color:var(--accent2);background:rgba(126,224,168,.1)}
  .badge.text{color:var(--warn);background:rgba(255,207,110,.1)}
  .mapcol{flex:1;display:flex;flex-direction:column;min-width:0}
  .layers{flex:1;overflow:auto;padding:20px 24px;display:flex;flex-direction:column;gap:15px}
  .lab{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
  .nodes{display:flex;gap:11px;flex-wrap:wrap}
  .node{padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--dim);font-size:12px;cursor:pointer}
  .node.lit{border-color:var(--hl);color:var(--txt);background:var(--hlbg);box-shadow:0 0 0 1px var(--hl) inset}
  .node .file{font-size:10px;color:#5b6675;margin-top:2px}.node.lit .file{color:var(--accent)}
  .code{height:170px;border-top:1px solid var(--line);background:var(--code);display:flex;flex-direction:column}
  .ch{padding:8px 14px;border-bottom:1px solid var(--line);font-size:12px;color:var(--dim);display:flex;gap:10px}
  .ch b{color:var(--txt)}.ch .why{color:var(--accent2)}.ch .open{margin-left:auto;color:var(--accent);cursor:pointer}
  .cb{flex:1;overflow:auto;padding:10px 16px;font:12px/1.5 "SF Mono",Menlo,monospace;color:#c9d4e0;white-space:pre}
  .k{color:#ff9ec4}.f{color:#7ee0a8}.s{color:#ffcf6e}.c{color:#5b6675}
  /* impact */
  .impact-grid{display:flex;gap:18px;flex-wrap:wrap}
  .blast{flex:1;min-width:300px}
  .dep-line{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;background:var(--panel)}
  .dep-line .arr{color:#37424f}
  .tag2{font-size:10px;padding:2px 8px;border-radius:6px;background:#222c38;color:var(--dim);margin-left:auto}
  .tag2.hot{color:var(--hot);background:rgba(255,138,138,.12)}
  table{border-collapse:collapse;width:100%;font-size:12px}
  td,th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}th{color:var(--dim);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .mono{font-family:"SF Mono",Menlo,monospace;font-size:11.5px}
  .conf{display:inline-block;width:34px;text-align:right;color:var(--dim)}
  .glossary span{display:inline-block;margin:0 6px 8px 0;padding:4px 10px;border:1px solid var(--line);border-radius:7px;background:var(--panel);font-size:12px}
  .glossary b{color:var(--accent2)}
</style>
</head>
<body>
<div class="app">
  <div class="rail">
    <div class="brand">◉ CIRCUIT</div>
    <div class="navlab">Comprehend</div>
    <div class="nav on" data-v="system" onclick="go('system')">🛰 System overview</div>
    <div class="nav" data-v="contexts" onclick="go('contexts')">🧭 Contexts &amp; architecture</div>
    <div class="nav" data-v="feature" onclick="go('feature')">⚡ Features ↔ code</div>
    <div class="nav" data-v="impact" onclick="go('impact')">💥 Impact / blast-radius</div>
    <div class="nav" data-v="scale" onclick="go('scale')">🏔 At monorepo scale</div>
    <div class="navlab">Other pillars</div>
    <div class="nav dis">🎛 Cockpit (health)</div>
    <div class="nav dis">🚦 Flow (delivery)</div>
  </div>

  <div class="wrap">
    <div class="top">
      <span class="crumbs" id="crumbs"><b>shop-api</b> · System overview</span>
      <div class="zoom" id="zoom"></div>
    </div>
    <div class="view" id="view"></div>
  </div>
</div>

<script>
/* ---------- data ---------- */
const NODES={
  refund_handler:{layer:0,file:"http/refund_handler.rs"},checkout_handler:{layer:0,file:"http/checkout_handler.rs"},login_handler:{layer:0,file:"http/login_handler.rs"},
  refund:{layer:1,file:"app/refund.rs"},checkout:{layer:1,file:"app/checkout.rs"},auth:{layer:1,file:"app/auth.rs"},
  payment:{layer:2,file:"domain/payment.rs"},order:{layer:2,file:"domain/order.rs"},user:{layer:2,file:"domain/user.rs"},
  stripe:{layer:3,file:"adapters/stripe.rs"},postgres:{layer:3,file:"adapters/postgres.rs"},
};
const LAYERS=["HTTP — entry points","Application — use cases","Domain — business rules","Adapters — outside world"];
const FEATURES=[
  {id:"refund",name:"Refund a payment",entry:"POST /refunds",conf:.91,col:"var(--accent2)",sub:"Issues a refund against a captured payment via Stripe.",ev:["test","trace"],path:["refund_handler","refund","payment","stripe"]},
  {id:"checkout",name:"Check out a cart",entry:"POST /checkout",conf:.88,col:"var(--accent2)",sub:"Creates an order, charges the card, persists it.",ev:["test","trace"],path:["checkout_handler","checkout","order","payment","stripe","postgres"]},
  {id:"login",name:"Log in",entry:"POST /login",conf:.79,col:"var(--warn)",sub:"Authenticates a user against stored credentials.",ev:["text","trace"],path:["login_handler","auth","user","postgres"]},
];
const CODE={
  refund:`<span class="k">pub fn</span> <span class="f">refund_payment</span>(id: PaymentId, port: &<span class="k">dyn</span> PaymentPort)\n    -> Result&lt;Refund, RefundError&gt; {\n  <span class="k">let</span> payment = repo.load(id)?;\n  <span class="k">let</span> refund = payment.<span class="f">refund</span>()?;     <span class="c">// business rule</span>\n  port.<span class="f">execute_refund</span>(&refund)?;          <span class="c">// → adapters/stripe.rs</span>\n  Ok(refund)\n}`,
  refund_handler:`<span class="k">async fn</span> <span class="f">refund_handler</span>(req: Json&lt;RefundReq&gt;) -> impl IntoResponse {\n  <span class="c">// entry point for POST /refunds</span>\n  Json(<span class="f">refund_payment</span>(req.payment_id, &stripe)?)\n}`,
  payment:`<span class="k">impl</span> Payment {\n  <span class="c">// rule: can only refund a captured payment</span>\n  <span class="k">pub fn</span> <span class="f">refund</span>(&self) -> Result&lt;Refund, RefundError&gt; {\n    <span class="k">if</span> self.status != Captured { <span class="k">return</span> Err(NotCaptured) }\n    Ok(Refund::from(self))\n  }\n}`,
  stripe:`<span class="k">impl</span> PaymentPort <span class="k">for</span> StripeClient {\n  <span class="k">fn</span> <span class="f">execute_refund</span>(&self, r: &Refund) -> Result&lt;(),Err&gt; {\n    self.http.post(<span class="s">"/v1/refunds"</span>, r)\n  }\n}`,
};
let cur="refund";

/* ---------- chrome ---------- */
const ZOOMS={system:["System","Context","Feature","Code"],contexts:["System","Context","Feature","Code"],feature:["System","Context","Feature","Code"]};
const ZOOMON={system:0,contexts:1,feature:2};
function zoomBar(v){const z=ZOOMS[v];if(!z)return"";return "zoom: "+z.map((s,i)=>`<span class="pill ${i==ZOOMON[v]?'on':''}">${s}</span>`).join("");}
const CRUMB={system:"System overview",contexts:"Contexts &amp; architecture",feature:"Features ↔ code",impact:"Impact / blast-radius",scale:"At monorepo scale"};

function go(v){
  document.querySelectorAll(".nav").forEach(n=>n.classList.toggle("on",n.dataset.v==v));
  document.getElementById("crumbs").innerHTML=`<b>shop-api</b> · ${CRUMB[v]}`;
  document.getElementById("zoom").innerHTML=zoomBar(v);
  document.getElementById("view").innerHTML=VIEWS[v]();
  if(v=="feature")renderFeat();
}

/* ---------- views ---------- */
const VIEWS={
system:()=>`<div class="pad">
  <h2>shop-api</h2>
  <p class="lead">A small payments &amp; checkout HTTP service built on a hexagonal core: an Axum web layer over use-cases and a Stripe + Postgres adapter ring. <span style="color:var(--accent2)">— summary written by Tau, cached locally.</span></p>
  <div class="row">
    <div class="card stat"><div class="n">3</div><div class="l">features found</div></div>
    <div class="card stat"><div class="n">3</div><div class="l">bounded contexts</div></div>
    <div class="card stat"><div class="n">11</div><div class="l">code units</div></div>
    <div class="card stat"><div class="n">3</div><div class="l">entry points</div></div>
    <div class="card stat" style="min-width:220px"><div class="l">Semantic index (local cache)</div>
      <div class="n" style="font-size:15px;margin-top:4px">8 cached · 3 re-deriving</div>
      <div class="bar"><i style="width:73%"></i></div>
      <div class="l" style="margin-top:6px">0 LLM calls on unchanged units · only the 3 edited files hit Tau</div></div>
  </div>
  <div class="sec">Entry points (deterministic)</div>
  <div class="row">
    <div class="card mono">POST /checkout &nbsp;<span style="color:var(--dim)">→ Check out a cart</span></div>
    <div class="card mono">POST /refunds &nbsp;<span style="color:var(--dim)">→ Refund a payment</span></div>
    <div class="card mono">POST /login &nbsp;<span style="color:var(--dim)">→ Log in</span></div>
  </div>
  <div class="sec">Ubiquitous language (extracted glossary)</div>
  <div class="glossary card" style="padding:14px">
    <span><b>Payment</b> — money captured for an order</span>
    <span><b>Refund</b> — reversal of a captured payment</span>
    <span><b>Order</b> — a cart turned into a purchase</span>
    <span><b>Captured</b> — a payment state, refundable</span>
  </div>
</div>`,

contexts:()=>`<div class="pad">
  <h2>Contexts &amp; architecture</h2>
  <p class="lead">The same code rolled up one altitude: <b>bounded contexts</b>, not files. This is the scale knob — for a 5-file script this collapses to one box; for a monorepo each box drills into its own sub-map.</p>
  <div class="ctxmap">
    <div class="ctx" onclick="go('feature')"><h4><span class="dot" style="background:var(--accent2)"></span>Billing</h4>
      <div class="body"><div class="feat">• Refund a payment</div><div class="feat">• Check out a cart</div></div>
      <div class="dep">depends on → Platform (Stripe, Postgres)</div></div>
    <div class="ctx" onclick="go('feature')"><h4><span class="dot" style="background:var(--accent)"></span>Identity</h4>
      <div class="body"><div class="feat">• Log in</div></div>
      <div class="dep">depends on → Platform (Postgres)</div></div>
    <div class="ctx"><h4><span class="dot" style="background:var(--warn)"></span>Platform</h4>
      <div class="body" style="color:var(--dim)">Adapters: Stripe, Postgres, HTTP server</div>
      <div class="dep">depended on by ← Billing, Identity</div></div>
  </div>
  <div class="sec">Why these boundaries?</div>
  <div class="card" style="max-width:680px;color:var(--dim)">Boundaries proposed by clustering (cohesion of calls + shared vocabulary), then <b style="color:var(--txt)">named by Tau</b>. <span style="color:var(--warn)">Advisory, not ground truth</span> — the research shows auto-recovered architecture tops out ~40-59% accuracy, so every boundary is a proposal you can rename, split or merge. Confirmed boundaries promote into the authored model.</div>
</div>`,

feature:()=>`<div class="fs">
  <div class="catalog"><div class="fhead">Feature catalog · 3</div><div id="flist"></div></div>
  <div class="mapcol">
    <div class="layers" id="layers"></div>
    <div class="code"><div class="ch"><span>📄 <b id="cf">app/refund.rs</b></span><span class="why" id="cw"></span><span class="open">open in editor ↗</span></div><div class="cb" id="cbody"></div></div>
  </div>
</div>`,

impact:()=>`<div class="pad">
  <h2>Impact / blast-radius</h2>
  <p class="lead">The reverse lookup — pick a unit, see <b>what depends on it</b> before you touch it. This is "focus on the right things": decide the change with its consequences in view, not after.</p>
  <div class="card" style="margin-bottom:16px"><span class="mono" style="color:var(--accent)">domain/payment.rs :: Payment::refund()</span> &nbsp;<span style="color:var(--dim)">— if you change this signature…</span></div>
  <div class="impact-grid">
    <div class="blast">
      <div class="sec" style="margin-top:0">Features affected</div>
      <div class="dep-line">⚡ Refund a payment <span class="arr">←</span> direct caller <span class="tag2 hot">breaks</span></div>
      <div class="dep-line">⚡ Check out a cart <span class="arr">←</span> uses Payment too <span class="tag2">review</span></div>
    </div>
    <div class="blast">
      <div class="sec" style="margin-top:0">Code &amp; tests touching it</div>
      <div class="dep-line mono">app/refund.rs <span class="tag2">caller</span></div>
      <div class="dep-line mono">adapters/stripe.rs <span class="tag2">PaymentPort impl</span></div>
      <div class="dep-line mono">tests/refund_test.rs <span class="tag2" style="color:var(--accent2)">2 tests cover</span></div>
    </div>
  </div>
  <div class="sec">Architectural note</div>
  <div class="card" style="max-width:680px;color:var(--dim)"><b style="color:var(--txt)">Domain → Adapter</b> dependency stays inward-only; refactor is safe w.r.t. the dependency rule. Changing the <span class="mono">PaymentPort</span> contract, however, ripples to every adapter — that's the high-stability node to think hardest about.</div>
</div>`,

scale:()=>`<div class="pad">
  <h2>At monorepo scale</h2>
  <p class="lead">Same surface, big numbers — proof it doesn't collapse. The literature's rule: never show more than a handful at once (navigability budget), so contexts stay collapsed and you search/drill.</p>
  <div class="row">
    <div class="card stat"><div class="n">14</div><div class="l">bounded contexts</div></div>
    <div class="card stat"><div class="n">312</div><div class="l">features</div></div>
    <div class="card stat"><div class="n">4,860</div><div class="l">code units</div></div>
    <div class="card stat"><div class="n">91%</div><div class="l">cached (instant open)</div></div>
  </div>
  <div class="sec">Contexts — collapsed, drill on demand</div>
  <table>
    <tr><th>Context</th><th>Features</th><th>Units</th><th>Avg confidence</th><th></th></tr>
    <tr><td>Billing</td><td>41</td><td>612</td><td><span class="conf">0.89</span></td><td style="color:var(--accent);cursor:pointer">drill ↘</td></tr>
    <tr><td>Catalog</td><td>58</td><td>880</td><td><span class="conf">0.86</span></td><td style="color:var(--accent);cursor:pointer">drill ↘</td></tr>
    <tr><td>Identity</td><td>23</td><td>410</td><td><span class="conf">0.81</span></td><td style="color:var(--accent);cursor:pointer">drill ↘</td></tr>
    <tr><td>Fulfilment</td><td>37</td><td>640</td><td><span class="conf">0.77</span></td><td style="color:var(--accent);cursor:pointer">drill ↘</td></tr>
    <tr><td style="color:var(--dim)">+ 10 more contexts…</td><td colspan="4" style="color:var(--dim)">search to jump anywhere</td></tr>
  </table>
  <div class="sec">Index cost</div>
  <div class="card" style="max-width:680px;color:var(--dim)">First full index of a repo this size: a one-time background pass (cached locally, gitignored). After that, opening the app re-derives <b style="color:var(--txt)">only the units whose content hash changed</b> — typically a handful per branch — so day-2 is instant.</div>
</div>`,
};

function renderFeat(){
  document.getElementById("flist").innerHTML=FEATURES.map(f=>`
    <div class="feat2 ${f.id==cur?'sel':''}" onclick="pick('${f.id}')">
      <div class="nm"><span class="dot" style="background:${f.col}"></span>${f.name}<span style="margin-left:auto;color:var(--dim);font-size:11px">${Math.round(f.conf*100)}%</span></div>
      <div class="sb">${f.entry} · ${f.path.length} files</div>
      ${f.ev.includes("test")?'<span class="badge test">test-proven</span>':'<span class="badge text">text-only · no test</span>'}
    </div>`).join("");
  const F=FEATURES.find(x=>x.id==cur),lit=new Set(F.path);
  document.getElementById("layers").innerHTML=LAYERS.map((lab,li)=>{
    const ns=Object.entries(NODES).filter(([,n])=>n.layer==li);
    return `<div><div class="lab">${lab}</div><div class="nodes">${ns.map(([id,n])=>`<div class="node ${lit.has(id)?'lit':''}" onclick="peek('${id}')">${id}<div class="file">${n.file}</div></div>`).join("")}</div></div>`;
  }).join("");
  peek(F.path[0]);
}
function pick(id){cur=id;renderFeat();}
function peek(id){
  document.getElementById("cf").textContent=NODES[id].file;
  document.getElementById("cbody").innerHTML=CODE[id]||'<span class="c">// summary cached; full source one click away</span>';
  const F=FEATURES.find(x=>x.id==cur);
  document.getElementById("cw").textContent=F.ev.includes("test")?"why it's here: a test in this feature executed this code (proof)":"why it's here: call-trace + identifiers (no test — lower confidence)";
}
go('system');
</script>
</body>
</html>
